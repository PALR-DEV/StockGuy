version: "4.0"

services:
  api:
    image: node:20
    container_name: stockguy-api-dev
    working_dir: /app
    volumes:
      - ./server/StockGuy-api:/app
      - /app/node_modules
    command: sh -c "npm install && npm run start:dev"
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"

  client:
    image: node:20
    container_name: stockguy-client-dev
    working_dir: /app
    volumes:
      - ./client/StockGuy:/app
      - /app/node_modules
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --poll 2000 --proxy-config proxy.conf.json"
    environment:
      - NODE_ENV=development
    depends_on:
      - api
    ports:
      - "4200:4200"